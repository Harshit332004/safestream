<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSafe - Elite Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>StreamSafe</h1>
            <p>Hyper-Resilient Streaming Engine</p>
        </header>

        <div id="status-toast" class="toast hidden"></div>

        <main>
            <section class="card form-card">
                <div class="form-row">
                    <select id="media-type">
                        <option value="movie">Movie</option>
                        <option value="tv">TV Show</option>
                    </select>
                    <input type="text" id="search-query" placeholder="Search title..." autocomplete="off">
                    <button id="btn-search" class="btn-primary">Search</button>
                </div>
                <div id="search-results" class="search-results hidden"></div>

                <!-- FIXED: Reactive TV Selector -->
                <div id="tv-selector" class="hidden" style="margin-top: 1rem;">
                    <p id="tv-title-display" class="accent-text"
                        style="margin-bottom: 8px; font-weight: bold; color: var(--accent);"></p>
                    <div class="form-row">
                        <select id="season-select" style="flex: 1;"></select>
                        <select id="episode-select" style="flex: 2;"></select>
                        <button id="btn-play-tv" class="btn-primary" disabled>Play</button>
                    </div>
                </div>
            </section>

            <section id="player-section" class="player-section hidden">
                <div class="player-header">
                    <!-- Manual Switch: Click badge to cycle providers -->
                    <span id="provider-badge" class="badge" data-action="manual-switch" style="cursor: pointer;"
                        title="Click to change server"></span>
                    <button class="btn-icon" data-action="close-player">✕ Close</button>
                </div>
                <div class="video-wrapper" id="iframe-wrapper"></div>
            </section>

            <section class="history-section">
                <h2>Continue Watching</h2>
                <div id="history-grid" class="history-grid"></div>
            </section>
        </main>
    </div>

    <!-- DOM Templates -->
    <template id="tpl-history-item">
        <div class="history-item">
            <button class="delete-btn" data-action="delete-history">✕</button>
            <div class="item-content" data-action="resume-play">
                <h3 class="item-title"></h3>
                <div class="item-meta"></div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-search-item">
        <div class="search-item" data-action="select-search">
            <strong class="search-title"></strong> <span class="search-year"></span>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
